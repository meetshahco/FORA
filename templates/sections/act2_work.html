<!-- FORA — act2_work.html -->
<!-- Slot-based. Codegen fills all {{slots}} based on content_brief.json act2_what_ive_done. -->
<!--
  SLOTS:
  {{act2_eyebrow}}      — e.g. "02 — What I've Done"
  {{act2_heading}}      — short heading for this section
  {{act2_intro_line}}   — one sentence from brief.act2_what_ive_done.intro_line
  {{act2_works_html}}   — 2–3 work entries, generated by codegen from works[] array.
                          Each work entry optionally includes a .fora-work-media figure
                          block rendered from the media field on the work entry in the brief.
                          Each work card follows the structure defined in default.md:
                          header (company + title + badge), body (decision + outcome),
                          framing angle as the opening line.
                          Format determined by section_format field in brief:
                            signal_card     — compact, 2-column grid
                            case_study_link — card with a "View case study" link
                            timeline_entry  — left-border timeline style
                            featured_project — full-width card, more detail
-->

<section class="fora-act2">
  <div class="fora-act2__inner">

    <span class="fora-eyebrow">{{act2_eyebrow}}</span>
    <h2 class="fora-section-heading">{{act2_heading}}</h2>
    <p class="fora-section-intro">{{act2_intro_line}}</p>

    <div class="fora-act2__works">
      {{act2_works_html}}
    </div>

  </div>
</section>
