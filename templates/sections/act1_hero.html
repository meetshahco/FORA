<!-- FORA — act1_hero.html -->
<!-- Slot-based. Codegen fills all {{slots}} based on content_brief.json act1_who_i_am. -->
<!--
  SLOTS:
  {{act1_eyebrow}}          — e.g. "01 — Who I Am"
  {{act1_heading}}          — designer's name or a short identity phrase
  {{act1_positioning_line}} — the one sentence written for this company
  {{act1_philosophy_note}}  — quote from profile.json philosophy, italic
  {{act1_signals_html}}     — 2–4 signal cards (see signal_cards.html for format)
                              injected inline here in act1, above the fold
-->

<section class="fora-act1">
  <div class="fora-act1__inner">

    <span class="fora-eyebrow">{{act1_eyebrow}}</span>
    <h1 class="fora-act1__heading">{{act1_heading}}</h1>

    <blockquote class="fora-act1__positioning">
      {{act1_positioning_line}}
    </blockquote>

    <p class="fora-act1__philosophy">
      {{act1_philosophy_note}}
    </p>

    <div class="fora-act1__signals">
      {{act1_signals_html}}
    </div>

  </div>
</section>
