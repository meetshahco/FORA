<!-- FORA — nav.html -->
<!-- Static section. Slots filled from content_brief.json, not by LLM. -->
<!-- Slots: {{designer_name}} {{company_name}} {{portfolio_url}} {{company_logo_url}} -->

<nav class="fora-nav">
  <div class="fora-nav__inner">
    <span class="fora-nav__name">{{designer_name}}</span>
    <span class="fora-nav__badge">
      <img src="{{company_logo_url}}" alt="{{company_name}}" class="fora-nav__logo" onerror="this.style.display='none'">
      For {{company_name}}
    </span>
    <a href="{{portfolio_url}}" target="_blank" rel="noopener" class="fora-nav__portfolio">Portfolio</a>
  </div>
</nav>
